name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check + Lint + Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Configure ShroudB registry
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << 'EOF'
          [source.crates-io]
          replace-with = "shroudb-cratesio"

          [source.shroudb-cratesio]
          registry = "sparse+https://crates.shroudb.dev/api/v1/cratesio/"

          [registries.shroudb-cratesio]
          index = "sparse+https://crates.shroudb.dev/api/v1/cratesio/"

          [registries.shroudb]
          index = "sparse+https://crates.shroudb.dev/api/v1/crates/"
          EOF

      - name: Configure ShroudB registry token
        run: |
          echo "[registries.shroudb-cratesio]" >> ~/.cargo/credentials.toml
          echo "token = \"${{ secrets.SHROUDB_REGISTRY_TOKEN }}\"" >> ~/.cargo/credentials.toml
          echo "[registries.shroudb]" >> ~/.cargo/credentials.toml
          echo "token = \"${{ secrets.SHROUDB_REGISTRY_TOKEN }}\"" >> ~/.cargo/credentials.toml

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Clippy (no-default-features)
        run: cargo clippy --package herald-server --no-default-features -- -D warnings

      - name: Clippy (chat only)
        run: cargo clippy --package herald-server --no-default-features --features chat -- -D warnings

      - name: Clippy (presence only)
        run: cargo clippy --package herald-server --no-default-features --features presence -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Build (no-default-features)
        run: cargo build --package herald-server --no-default-features

      - name: Unit tests
        run: cargo test --workspace --lib
        env:
          SHROUDB_MASTER_KEY: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"

      - name: Integration tests
        run: cargo test --test integration --test bench_latency -- --test-threads=1
        env:
          SHROUDB_MASTER_KEY: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"

      - name: Generate OpenAPI spec
        run: cargo test --features openapi --lib -- openapi::tests::generate_spec_files --nocapture
        env:
          SHROUDB_MASTER_KEY: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"

      - name: Validate OpenAPI spec against contract tests
        run: |
          python3 -c "
          import json, sys
          contract = json.load(open('contract-tests/spec/spec.json'))
          openapi = json.load(open('openapi.json'))
          op_map = {
            'health': ('get', '/health'),
            'streams.create': ('post', '/streams'), 'streams.get': ('get', '/streams/{id}'),
            'streams.list': ('get', '/streams'), 'streams.update': ('patch', '/streams/{id}'),
            'streams.delete': ('delete', '/streams/{id}'),
            'members.add': ('post', '/streams/{id}/members'), 'members.list': ('get', '/streams/{id}/members'),
            'members.update': ('patch', '/streams/{id}/members/{user_id}'), 'members.remove': ('delete', '/streams/{id}/members/{user_id}'),
            'events.publish': ('post', '/streams/{id}/events'), 'events.list': ('get', '/streams/{id}/events'),
            'events.edit': ('patch', '/streams/{id}/events/{event_id}'), 'events.delete': ('delete', '/streams/{id}/events/{event_id}'),
            'events.getReactions': ('get', '/streams/{id}/events/{event_id}/reactions'), 'events.trigger': ('post', '/streams/{id}/trigger'),
            'presence.getUser': ('get', '/presence/{user_id}'), 'presence.getStream': ('get', '/streams/{id}/presence'),
            'presence.getBulk': ('get', '/presence'), 'presence.setOverride': ('post', '/presence/{user_id}'),
            'presence.getCursors': ('get', '/streams/{id}/cursors'),
            'blocks.block': ('post', '/blocks'), 'blocks.unblock': ('delete', '/blocks'), 'blocks.list': ('get', '/blocks/{user_id}'),
          }
          ops = set()
          for g in contract['groups']:
            for c in g['cases']:
              ops.add(c['operation'])
          ok = True
          for op in sorted(ops):
            if op in op_map:
              m, p = op_map[op]
              if p not in openapi['paths'] or m not in openapi['paths'][p]:
                print(f'MISSING: {op} -> {m.upper()} {p}'); ok = False
          if ok:
            print(f'OK: all {len(ops)} contract operations covered')
          else:
            sys.exit(1)
          "

      - name: Upload OpenAPI spec
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: |
            openapi.json
            openapi.yaml

      - name: Build release binary (for live integration tests)
        run: cargo build --release

      # Topological order: herald-sdk → herald-admin → herald-chat-sdk → herald-presence-sdk → herald-chat-core
      # (herald-chat-react not needed by test-integration)
      - name: Build TypeScript SDKs
        run: |
          cd herald-sdk-typescript && npm install && npx tsc && cd ..
          cd herald-admin-typescript && npm install && npx tsc && cd ..
          cd herald-chat-sdk-typescript && npm install && npx tsc && cd ..
          cd herald-presence-sdk-typescript && npm install && npx tsc && cd ..
          cd herald-chat-core && npm install && npx tsc && cd ..

      - name: Live integration tests
        run: |
          cd test-integration
          npm install
          npx tsx test-live.ts
        env:
          SHROUDB_MASTER_KEY: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"

      - name: Setup Go (for contract tests)
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Setup Python (for contract tests)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Ruby (for contract tests)
        uses: actions/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Setup PHP (for contract tests)
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: Setup .NET (for contract tests)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0"

      - name: Build C# SDK + contract runner
        run: cd contract-tests/csharp && dotnet build

      - name: Contract tests (all SDKs)
        run: |
          cd contract-tests
          npm install
          npx tsx run-all.ts
        env:
          SHROUDB_MASTER_KEY: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"

      - name: Verify codegen is up to date
        run: |
          cd codegen && npm install && npx tsx generate.ts
          git diff --exit-code -- herald-admin-typescript/src/ herald-admin-go/*.go herald-admin-python/herald_admin/ herald-admin-ruby/lib/ herald-admin-php/src/ herald-admin-csharp/*.cs

      - name: Security audit
        run: cargo install cargo-audit --locked && cargo audit
        continue-on-error: true

  sdk-check-ts:
    name: TypeScript SDK Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: TypeScript Browser SDK
        working-directory: herald-sdk-typescript
        run: npm install && npx tsc --noEmit

      - name: TypeScript Admin SDK
        working-directory: herald-admin-typescript
        run: npm install && npx tsc --noEmit

  sdk-check-go:
    name: Go SDK Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Go Admin SDK
        run: cd herald-admin-go && go build ./...

  sdk-check-python:
    name: Python SDK Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Python Admin SDK
        working-directory: herald-admin-python
        run: python3 -c "from herald_admin import HeraldAdmin"

  sdk-check-ruby:
    name: Ruby SDK Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Ruby Admin SDK
        working-directory: herald-admin-ruby
        run: ruby -e "require_relative 'lib/herald_admin'"

  sdk-check-php:
    name: PHP SDK Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: PHP Admin SDK
        working-directory: herald-admin-php
        run: php -r "require 'autoload.php'; new Herald\Admin\HeraldAdmin('http://localhost', token:'test'); echo 'OK';"

  sdk-check-csharp:
    name: C# SDK Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0"

      - name: C# Admin SDK
        working-directory: herald-admin-csharp
        run: dotnet build

  sdk-check-chat:
    name: Chat SDK Build + Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Topological order: herald-sdk → herald-admin → herald-chat-sdk → herald-chat-core → herald-chat-react
      - name: Build TypeScript SDKs
        run: |
          cd herald-sdk-typescript && npm install && npx tsc && cd ..
          cd herald-admin-typescript && npm install && npx tsc && cd ..

      - name: Chat SDK — build
        working-directory: herald-chat-sdk-typescript
        run: npm install && npx tsc

      - name: Presence SDK — build
        working-directory: herald-presence-sdk-typescript
        run: npm install && npx tsc

      - name: Chat Core — build
        working-directory: herald-chat-core
        run: npm install && npx tsc

      - name: Chat React — build
        working-directory: herald-chat-react
        run: npm install && npx tsc --noEmit

      - name: Chat SDK — unit tests
        working-directory: herald-chat-sdk-typescript
        run: npx tsx test/client.test.ts

      - name: Chat Core — unit tests
        working-directory: herald-chat-core
        run: |
          npx tsx test/chat-core.test.ts
          npx tsx test/message-store.test.ts
          npx tsx test/cursor-store.test.ts
          npx tsx test/notifier.test.ts
          npx tsx test/liveness.test.ts

      - name: Chat React — unit tests
        working-directory: herald-chat-react
        run: npx tsx test/hooks.test.ts
