name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    name: Docker Image → GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure ShroudB registry for Docker build
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml << 'EOF'
          [source.crates-io]
          replace-with = "shroudb-cratesio"

          [source.shroudb-cratesio]
          registry = "sparse+https://crates.shroudb.dev/api/v1/cratesio/"

          [registries.shroudb-cratesio]
          index = "sparse+https://crates.shroudb.dev/api/v1/cratesio/"
          credential-provider = ["cargo:token"]

          [registries.shroudb]
          index = "sparse+https://crates.shroudb.dev/api/v1/crates/"
          credential-provider = ["cargo:token"]
          EOF

          cat > .cargo/credentials.toml << EOF
          [registries.shroudb-cratesio]
          token = "${{ secrets.SHROUDB_REGISTRY_TOKEN }}"

          [registries.shroudb]
          token = "${{ secrets.SHROUDB_REGISTRY_TOKEN }}"
          EOF

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Admin UI Docker image moved to skeptik-io/herald-admin-ui repo

  publish-npm:
    name: Publish TypeScript SDKs → GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@skeptik-io"

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Publish herald-sdk (browser WS client)
        working-directory: herald-sdk-typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Scope package to org for GitHub Packages
          jq '.name = "@skeptik-io/herald-sdk" | .version = env.VERSION | .publishConfig = {"registry": "https://npm.pkg.github.com"}' package.json > package.tmp && mv package.tmp package.json
          npm install
          npx tsc
          npm publish

      - name: Publish herald-admin (Node HTTP client)
        working-directory: herald-admin-typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          jq '.name = "@skeptik-io/herald-admin" | .version = env.VERSION | .publishConfig = {"registry": "https://npm.pkg.github.com"}' package.json > package.tmp && mv package.tmp package.json
          npm install
          npx tsc
          npm publish

      - name: Publish herald-chat-sdk (WS chat frame types)
        working-directory: herald-chat-sdk-typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          jq --arg v "$VERSION" '
            .name = "@skeptik-io/herald-chat-sdk" |
            .version = $v |
            .publishConfig = {"registry": "https://npm.pkg.github.com"} |
            .peerDependencies = {"@skeptik-io/herald-sdk": "^2.0.0"}
          ' package.json > package.tmp && mv package.tmp package.json
          npm install
          npx tsc
          # Rewrite unscoped imports to scoped names in compiled output
          find dist -name '*.js' -o -name '*.d.ts' | xargs sed -i 's|"herald-sdk"|"@skeptik-io/herald-sdk"|g'
          npm publish

      - name: Publish herald-chat (ChatCore state machine)
        working-directory: herald-chat-core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          jq --arg v "$VERSION" '
            .name = "@skeptik-io/herald-chat" |
            .version = $v |
            .publishConfig = {"registry": "https://npm.pkg.github.com"} |
            .peerDependencies = {
              "@skeptik-io/herald-sdk": "^2.0.0",
              "@skeptik-io/herald-chat-sdk": "^0.1.0"
            }
          ' package.json > package.tmp && mv package.tmp package.json
          npm install
          npx tsc
          find dist -name '*.js' -o -name '*.d.ts' | xargs sed -i 's|"herald-chat-sdk"|"@skeptik-io/herald-chat-sdk"|g; s|"herald-sdk"|"@skeptik-io/herald-sdk"|g'
          npm publish

      - name: Publish herald-chat-react (React hooks + components)
        working-directory: herald-chat-react
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          jq --arg v "$VERSION" '
            .name = "@skeptik-io/herald-chat-react" |
            .version = $v |
            .publishConfig = {"registry": "https://npm.pkg.github.com"} |
            .peerDependencies = {
              "@skeptik-io/herald-chat": "^0.1.0",
              "@skeptik-io/herald-chat-sdk": "^0.1.0",
              "react": "^18.0.0 || ^19.0.0"
            }
          ' package.json > package.tmp && mv package.tmp package.json
          npm install
          npx tsc
          find dist -name '*.js' -o -name '*.d.ts' | xargs sed -i 's|"herald-chat-sdk"|"@skeptik-io/herald-chat-sdk"|g; s|"herald-chat"|"@skeptik-io/herald-chat"|g; s|"herald-sdk"|"@skeptik-io/herald-sdk"|g'
          npm publish

  publish-go:
    name: Tag Go Module
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Tag Go module
        run: |
          VERSION=${GITHUB_REF_NAME}
          cd herald-admin-go
          # Go modules use the repo tag directly — just verify it builds
          go build ./...
          echo "Go module tagged at $VERSION"

  publish-python:
    name: Publish Python SDK → GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build and publish
        working-directory: herald-admin-python
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/version = \"0.1.0\"/version = \"$VERSION\"/" pyproject.toml
          pip install build
          python -m build
          echo "Python package built: dist/"
          # For GitHub Packages, upload as release artifact
          # (PyPI-style GitHub Packages requires additional setup)

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: herald-admin-python/dist/*

  publish-ruby:
    name: Publish Ruby Gem → GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Build and publish
        working-directory: herald-admin-ruby
        env:
          GEM_HOST_API_KEY: "Bearer ${{ secrets.GITHUB_TOKEN }}"
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/0.1.0/$VERSION/" herald-admin.gemspec
          gem build herald-admin.gemspec
          gem push --host https://rubygems.pkg.github.com/skeptik-io herald-admin-${VERSION}.gem
